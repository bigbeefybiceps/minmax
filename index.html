<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>MinMax</title>
  <meta name="description" content="Weight-lifting tracker for Jeff Nippard's Min-Max Program (5x/week)">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MinMax">
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <main id="view"></main>
    <nav id="tabbar">
      <button class="tab" data-tab="today"><span class="tab-icon">🏋️</span>Today</button>
      <button class="tab" data-tab="calendar"><span class="tab-icon">📅</span>Calendar</button>
      <button class="tab" data-tab="progress"><span class="tab-icon">📈</span>Progress</button>
      <button class="tab" data-tab="coach"><span class="tab-icon">🧠</span>Coach</button>
    </nav>
  </div>
  <div id="modals"></div>
  <script src="program.js"></script>
  <script src="app.js"></script>
</body>
</html>
